name: Vercel Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy preview and run Lighthouse
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    environment:
      name: preview-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build static site
        run: npm run build

      - name: Validate static links
        run: npm run check

      - name: Deploy Vercel preview
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::error::Missing one or more required secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            exit 1
          fi

          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {"orgId":"${VERCEL_ORG_ID}","projectId":"${VERCEL_PROJECT_ID}"}
          EOF

          deploy_output="$(npx --yes vercel@latest deploy --yes --token "${VERCEL_TOKEN}" 2>&1)"
          echo "${deploy_output}"

          deployment_url="$(echo "${deploy_output}" | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1)"
          if [ -z "${deployment_url}" ]; then
            echo "::error::Could not find a Vercel deployment URL in CLI output"
            exit 1
          fi

          echo "url=${deployment_url}" >> "${GITHUB_OUTPUT}"
          echo "VERCEL_DEPLOYMENT_URL=${deployment_url}" >> "${GITHUB_ENV}"

      - name: Run Lighthouse CI against preview
        env:
          LHCI_URLS: ${{ steps.deploy.outputs.url }},${{ steps.deploy.outputs.url }}/en.html,${{ steps.deploy.outputs.url }}/jonusta.html,${{ steps.deploy.outputs.url }}/services.html
        run: npx --yes @lhci/cli@0.14.x autorun --config=./lighthouserc.cjs

      - name: Summarize Lighthouse results
        run: node tools/summarize-lighthouse.mjs

      - name: Add Lighthouse summary to workflow
        run: cat lhci-results/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-preview-${{ github.event.pull_request.number }}
          path: lhci-results
          if-no-files-found: ignore

      - name: Comment preview details on PR
        uses: actions/github-script@v7
        if: always()
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- kalvex-preview-app -->';
            const summaryPath = 'lhci-results/summary.md';
            const lighthouseSummary = fs.existsSync(summaryPath)
              ? fs.readFileSync(summaryPath, 'utf8')
              : '_Lighthouse did not produce a summary. Check the workflow logs._';
            const deploymentUrl = process.env.DEPLOYMENT_URL || '_Deployment URL unavailable_';
            const body = [
              marker,
              '### Kalvex preview app',
              '',
              `Preview deployment: ${deploymentUrl}`,
              '',
              lighthouseSummary
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
