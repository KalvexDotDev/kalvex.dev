name: Static Site CI/CD

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-site-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, validate and audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build static site
        run: npm run build

      - name: Validate static links
        run: npm run check

      - name: Upload static output
        uses: actions/upload-artifact@v4
        with:
          name: kalvex-static-output
          path: output
          if-no-files-found: error

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Start static server
        run: |
          npm run serve > server.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat server.log
          exit 1

      - name: Run Lighthouse CI locally
        env:
          LHCI_URLS: http://127.0.0.1:4173/,http://127.0.0.1:4173/en.html,http://127.0.0.1:4173/with-you-on-your-side.html,http://127.0.0.1:4173/next-steps.html
        run: npx --yes @lhci/cli@0.14.x autorun --config=./lighthouserc.cjs

      - name: Summarize Lighthouse results
        if: always()
        run: node tools/summarize-lighthouse.mjs

      - name: Add Lighthouse summary to workflow
        if: always()
        run: cat lhci-results/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: lhci-results
          if-no-files-found: ignore

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
